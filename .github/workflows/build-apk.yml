name: Build Standalone APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    name: Build Flutter APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Fetch proot binaries from Termux
        run: |
          set -x
          JNILIBS="flutter_app/android/app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$JNILIBS"
          TMP_DIR=$(mktemp -d)
          TERMUX_REPO="https://packages-cf.termux.dev/apt/termux-main"
          
          # Get package URL
          pkg_url=$(curl -fsSL "${TERMUX_REPO}/dists/stable/main/binary-aarch64/Packages" | \
            grep -A 20 "^Package: proot$" | grep "^Filename:" | head -1 | awk '{print $2}')
          echo "Package: $pkg_url"
          
          # Download and extract
          curl -fsSL "${TERMUX_REPO}/${pkg_url}" -o "$TMP_DIR/proot.deb"
          cd "$TMP_DIR"
          ar x proot.deb
          if [ -f data.tar.xz ]; then tar xf data.tar.xz; elif [ -f data.tar.gz ]; then tar xf data.tar.gz; fi
          
          # Copy proot as libproot.so
          proot_bin=$(find . -name "proot" -path "*/bin/*" -type f | head -1)
          echo "Found: $proot_bin"
          cp "$proot_bin" "$GITHUB_WORKSPACE/$JNILIBS/libproot.so"
          chmod 755 "$GITHUB_WORKSPACE/$JNILIBS/libproot.so"
          
          # Copy loader
          loader=$(find . -name "loader" -not -name "loader32" -path "*/proot/*" -type f | head -1)
          [ -n "$loader" ] && cp "$loader" "$GITHUB_WORKSPACE/$JNILIBS/libprootloader.so" && chmod 755 "$GITHUB_WORKSPACE/$JNILIBS/libprootloader.so"
          
          loader32=$(find . -name "loader32" -path "*/proot/*" -type f | head -1)
          [ -n "$loader32" ] && cp "$loader32" "$GITHUB_WORKSPACE/$JNILIBS/libprootloader32.so" && chmod 755 "$GITHUB_WORKSPACE/$JNILIBS/libprootloader32.so"
          
          # Copy libtalloc
          talloc=$(find . -name "libtalloc.so*" -not -name "*.py" -type f | head -1)
          [ -n "$talloc" ] && cp -L "$talloc" "$GITHUB_WORKSPACE/$JNILIBS/libtalloc.so" && chmod 755 "$GITHUB_WORKSPACE/$JNILIBS/libtalloc.so"
          
          rm -rf "$TMP_DIR"
          
          echo "=== jniLibs ==="
          ls -la "$GITHUB_WORKSPACE/$JNILIBS/"
          
      - name: Flutter pub get
        run: |
          cd flutter_app
          flutter pub get

      - name: Build Flutter APK
        run: |
          cd flutter_app
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: archclaw-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
