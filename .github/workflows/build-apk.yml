name: Build Standalone APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Fetch proot binaries from Termux
        run: |
          chmod +x scripts/fetch-proot-binaries.sh
          ./scripts/fetch-proot-binaries.sh

      - name: Show jniLibs
        run: find android/app/src/main/jniLibs/ -type f 2>/dev/null || echo "No jniLibs"

      - name: Flutter pub get
        run: |
          cd flutter_app
          flutter pub get

      - name: Build Flutter APK
        run: |
          cd flutter_app
          flutter build apk --release --target-platform android-arm64

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: archclaw-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
