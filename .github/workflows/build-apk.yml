name: Build Standalone APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build-rust:
    name: Build Rust Core
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build Rust for Android ARM64
        run: |
          cd rust/core
          cargo build --release --target aarch64-linux-android

      - name: Upload Rust library
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-aarch64
          path: rust/core/target/aarch64-linux-android/release/libarchclaw_core.so
          if-no-files-found: warn

      - name: Run Rust tests
        run: |
          cd rust
          cargo test || true

  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    needs: build-rust
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Download Rust library artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-lib-aarch64
          path: android/app/src/main/jniLibs/arm64-v8a/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: archclaw-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Build Release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: archclaw-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
