name: Build Standalone APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build-rust:
    name: Build Rust Core (aarch64)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
          add-to-path: true

      - name: Configure Rust NDK linker
        run: |
          NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          cd rust
          mkdir -p .cargo
          cat > .cargo/config.toml <<CARGO
          [target.aarch64-linux-android]
          linker = "${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          ar = "${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          CARGO
          cat .cargo/config.toml

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build Rust for Android ARM64
        run: |
          cd rust/core
          cargo build --release --target aarch64-linux-android
          echo "=== Finding .so files ==="
          find ../../target/aarch64-linux-android/release -name "*.so" -exec ls -lh {} \;

      - name: Upload Rust .so
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-aarch64
          path: target/aarch64-linux-android/release/*.so
          if-no-files-found: warn

      - name: Run Rust tests (host)
        run: cd rust/core && cargo test || true

  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    needs: build-rust
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Download Rust .so artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-lib-aarch64
          path: android/app/src/main/jniLibs/arm64-v8a/

      - name: Show JNI libs
        run: find android/app/src/main/jniLibs/ -type f 2>/dev/null || echo "No JNI libs"

      - name: Build Debug APK with gradle
        run: |
          cd android
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: archclaw-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Build Release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          cd android
          gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: archclaw-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
