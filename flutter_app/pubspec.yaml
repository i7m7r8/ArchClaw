name: archclaw
description: Ultra-powered Linux desktop for Android with AI capabilities
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.0
  
  # UI Components
  flutter_terminal: ^0.5.0
  webview_flutter: ^4.5.0
  flutter_svg: ^2.0.9
  flutter_animate: ^4.3.0
  
  # Storage & Config
  shared_preferences: ^2.2.2
  encrypt: ^5.0.3
  path_provider: ^2.1.1
  
  # Networking
  web_socket_channel: ^2.4.0
  http: ^1.1.2
  dio: ^5.4.0
  
  # Permissions & System
  permission_handler: ^11.1.0
  battery_plus: ^5.0.2
  device_info_plus: ^9.1.1
  
  # Utilities
  intl: ^0.19.0
  logger: ^2.0.2+1
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/config/
  
  # fonts:
  #   - family: ArchClaw
  #     fonts:
